<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgedd</title>

<style>

/* ========================= */
/* ROOT */
/* ========================= */

:root {
  --primary: #3c9600;
  --primary-light: #4bbd00;

  --bg: #000;
  --card: #02040a;

  --text: #fff;
  --muted: #a0a6b3;

  --border: rgba(255,255,255,0.08);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* ========================= */
/* SEARCH BAR */
/* ========================= */

.search-container {
  max-width: 1100px;
  margin: 100px auto 30px;
  padding: 0 20px;
}

.search-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);

  background: #02040a;
  color: var(--text);
}

/* FILTER BUTTONS */
.filter-btn {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);

  background: #02040a;
  color: var(--muted);
  cursor: pointer;

  position: relative;
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  top: 110%;
  left: 0;

  background: #02040a;
  border: 1px solid var(--border);
  border-radius: 10px;

  padding: 8px;
  min-width: 160px;
  z-index: 50;
}

.filter-btn:focus-within .dropdown {
  display: block;
}

.dropdown div {
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
}

.dropdown div:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

/* ========================= */
/* SERVER CARD */
/* ========================= */

.server-wrapper {
  max-width: 900px;
  margin: auto;
  padding: 0 20px;
}

.server-card {
  padding: 18px;
  border-radius: 16px;

  background: var(--card);
  border: 1px solid var(--border);

  display: flex;
  flex-direction: column;
  gap: 10px;

  transition: 0.2s;
}

.server-card:hover {
  border-color: var(--primary);
}

/* TAGS */
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.card-tags span {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;

  background: rgba(60,150,0,0.2);
  color: var(--primary);
}

/* TITLE */
.server-card h3 {
  font-size: 18px;
}

/* STATUS */
.status {
  font-size: 13px;
  color: var(--muted);
}

/* ACTIONS */
.card-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BUTTONS */
.action-btn {
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;

  transition: 0.2s;
}

.action-btn:hover {
  color: var(--primary);
}

/* JOIN BUTTON */
.join-btn {
  padding: 8px 16px;
  border-radius: 999px;
  border: none;

  background: var(--primary);
  color: #fff;
  cursor: pointer;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 900px) {

  .search-bar {
    flex-direction: column;
  }

}

</style>
</head>

<body>

<!-- SEARCH -->
<div class="search-container">
  <div class="search-bar">

    <input class="search-input" placeholder="🔎 Search servers…">

    <!-- POSITIONS -->
    <div class="filter-btn" tabindex="0">
      Positions
      <div class="dropdown">
        <div>Moderator</div>
        <div>Developer</div>
        <div>Designer</div>
      </div>
    </div>

    <!-- QUOTA -->
    <div class="filter-btn" tabindex="0">
      Quota Range
      <div class="dropdown">
        <div>1–2</div>
        <div>3–5</div>
        <div>5+</div>
      </div>
    </div>

    <!-- REGION -->
    <div class="filter-btn" tabindex="0">
      Region
      <div class="dropdown">
        <div>Global</div>
        <div>Australia / NZ</div>
        <div>North America</div>
      </div>
    </div>

  </div>
</div>

<!-- SERVER -->
<div class="server-wrapper">

  <div class="server-card">

    <div class="card-tags">
      <span>MODERATOR</span>
      <span>DEVELOPER</span>
    </div>

    <h3>Surgedd RP</h3>

    <p class="status">ACTIVE • HIRING</p>

    <div class="card-actions">

      <div>
        <button class="action-btn">❤️</button>
        <button class="action-btn">🚩</button>
      </div>

      <button class="join-btn">Join</button>

    </div>

  </div>

</div>

</body>
</html>
