<style>
 
/* ========================= */
/* SEARCH BAR */
/* ========================= */

.search-bar {
  max-width: 1100px;
  margin: 120px auto 30px;
  padding: 0 20px;
}

.search-input-wrap {
  position: relative;
}

.search-input-wrap input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);

  background: #02040a;
  color: var(--text);
  font-size: 14px;
}

/* POPUP */
.search-popup {
  position: absolute;
  top: 110%;
  left: 0;
  width: 100%;

  background: #02040a;
  border: 1px solid var(--border);
  border-radius: 12px;

  display: none;
  flex-direction: column;
  padding: 6px;
  z-index: 50;
}

.popup-item {
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  transition: 0.2s;
}

.popup-item:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

/* show popup */
.search-input-wrap:focus-within .search-popup {
  display: flex;
}

/* ========================= */
/* SERVER CARD */
/* ========================= */

.server-card {
  max-width: 350px;
  padding: 16px;
  margin: 20px;

  background: #02040a;
  border: 1px solid var(--border);
  border-radius: 16px;

  transition: 0.2s ease;
}

.server-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

/* TOP TAGS */
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.card-tags span {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;

  background: rgba(60,150,0,0.15);
  color: var(--primary);
}

/* TITLE */
.server-card h3 {
  margin-bottom: 6px;
}

/* STATUS */
.status {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
}

/* FOOTER */
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;

  font-size: 13px;
  color: var(--muted);
}

.stats {
  display: flex;
  gap: 12px;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 700px) {

  .server-card {
    max-width: 100%;
    margin: 10px 20px;
  }

} 
</style>



<!-- SEARCH BAR -->
<div class="search-bar">

  <div class="search-input-wrap">
    <input type="text" placeholder="Search servers...">

    <!-- POPUP -->
    <div class="search-popup">
      <div class="popup-item">Moderator</div>
      <div class="popup-item">Developer</div>
      <div class="popup-item">Serious RP</div>
      <div class="popup-item">Beginner Friendly</div>
    </div>
  </div>

</div>


<!-- SERVER CARD -->
<div class="server-card">

  <!-- TOP TAGS (POSITIONS ONLY) -->
  <div class="card-tags">
    <span>MODERATOR</span>
    <span>DEVELOPER</span>
    <span>+1</span>
  </div>

  <!-- TITLE -->
  <h3>Surgedd RP</h3>

  <!-- STATUS (replaces description) -->
  <p class="status">ACTIVE • HIRING</p>

  <!-- BOTTOM BAR -->
  <div class="card-footer">
    <span class="owner">Surgedd Team</span>

    <div class="stats">
      <span>👁 120</span>
      <span>❤ 12</span>
    </div>
  </div>

</div>
