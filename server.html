<style>
  
/* ========================= */
/* SEARCH */
/* ========================= */

.search-wrapper {
  max-width: 900px;
  margin: 120px auto 30px;
  padding: 0 20px;
}

.search-input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);

  background: #02040a;
  color: var(--text);
  margin-bottom: 20px;
}

/* FILTER GROUPS */
.filter-groups {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.filter-group span {
  font-size: 13px;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.filters button {
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;

  transition: 0.2s ease;
}

.filters button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* ========================= */
/* SERVER CARD */
/* ========================= */

.server-card {
  max-width: 900px;
  margin: auto;
  padding: 18px;

  display: flex;
  gap: 16px;
  align-items: center;

  background: #02040a;
  border: 1px solid var(--border);
  border-radius: 16px;

  transition: 0.2s ease;
}

.server-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

/* ICON */
.server-icon {
  width: 70px;
  height: 70px;
  border-radius: 16px;
}

/* INFO */
.server-info {
  flex: 1;
}

.server-info h3 {
  margin-bottom: 4px;
}

.server-info p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* TAGS */
.tag-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tags span {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 999px;
}

/* PRIMARY (important filters) */
.tags.primary span {
  background: rgba(60,150,0,0.2);
  color: var(--primary);
}

/* EXTRA (secondary info) */
.tags.extra span {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
}

/* BUTTON */
.join-btn {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;

  background: var(--primary);
  color: white;
  cursor: pointer;

  transition: 0.2s ease;
}

.join-btn:hover {
  background: var(--primary-light);
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 700px) {

  .server-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .join-btn {
    width: 100%;
  }

}
</style>

<!-- SEARCH + FILTER -->
<div class="search-wrapper">

  <input type="text" placeholder="Search servers..." class="search-input">

  <div class="filter-groups">

    <!-- POSITION -->
    <div class="filter-group">
      <span>Position</span>
      <div class="filters">
        <button>Moderator</button>
        <button>Developer</button>
        <button>Designer</button>
      </div>
    </div>

    <!-- SERVER TYPE -->
    <div class="filter-group">
      <span>Server Type</span>
      <div class="filters">
        <button>Serious RP</button>
        <button>Casual RP</button>
        <button>Public</button>
      </div>
    </div>

    <!-- EXPERIENCE -->
    <div class="filter-group">
      <span>Experience</span>
      <div class="filters">
        <button>No Experience</button>
        <button>Some Experience</button>
        <button>Experienced</button>
      </div>
    </div>

  </div>

</div>


<!-- SERVER CARD -->
<div class="server-card">

  <img class="server-icon" src="https://via.placeholder.com/70">

  <div class="server-info">
    <h3>Surgedd RP</h3>
    <p>High-quality ERLC roleplay server focused on realism and active staff.</p>

    <!-- TAGS -->
    <div class="tag-section">

      <!-- PRIMARY TAGS -->
      <div class="tags primary">
        <span>Moderator</span>
        <span>Serious RP</span>
        <span>Experienced</span>
      </div>

      <!-- EXTRA TAGS -->
      <div class="tags extra">
        <span>🔥 Actively Hiring</span>
        <span>Very Active</span>
        <span>Australia / NZ</span>
      </div>

    </div>
  </div>

  <button class="join-btn">Join</button>

</div>
