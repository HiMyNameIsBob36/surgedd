<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgedd</title>

<style>

/* ========================= */
/* ROOT */
/* ========================= */

:root {
  --primary: #3c9600;
  --border: rgba(255,255,255,0.15);
  --bg: #000;
  --card: #02040a;
  --text: #fff;
  --muted: #8b8f98;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 40px 20px;
}

/* ========================= */
/* SEARCH BAR */
/* ========================= */

.search-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  max-width: 1100px;
  margin: auto;
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 12px 16px;
  border-radius: 30px;
  border: 2px solid var(--border);
}

.search-box input {
  background: none;
  border: none;
  outline: none;
  color: white;
  width: 100%;
}

/* FILTER BOX */

.filter-box {
  padding: 10px 16px;
  border-radius: 30px;
  border: 2px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  position: relative;
  min-width: 100px;
  text-align: center;
}

/* ========================= */
/* POPUPS */
/* ========================= */

.popup {
  position: absolute;
  top: 120%;
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  display: none;
  z-index: 100;
}

.filter-box.active .popup {
  display: block;
}

/* ========================= */
/* QUOTA */
/* ========================= */

.quota-popup {
  width: 200px;
}

/* INPUT DISPLAY */
.quota-inputs {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}

.quota-inputs input {
  width: 50px;
  text-align: center;
  padding: 6px;
  background: #000;
  border: 1px solid var(--border);
  color: white;
  border-radius: 6px;
}

/* NUMPAD */
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.numpad button {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #000;
  color: white;
  cursor: pointer;
}

.numpad button:hover {
  background: rgba(255,255,255,0.05);
}

/* ========================= */
/* SERVER CARD */
/* ========================= */

.server-card {
  max-width: 900px;
  margin: 30px auto;
  padding: 16px;

  border-radius: 20px;
  border: 2px solid var(--border);
  background: var(--card);

  display: flex;
  align-items: center;
  gap: 16px;
}

.server-logo {
  width: 80px;
}

.server-content {
  flex: 1;
}

.tags {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
}

.tags span {
  background: rgba(60,150,0,0.3);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.server-content p {
  font-weight: 600;
}

/* ACTIONS */

.actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.icon {
  width: 22px;
  height: 22px;
  cursor: pointer;
  transition: 0.2s;
}

.icon:hover {
  transform: scale(1.1);
}

.bookmark.active {
  fill: var(--primary);
  transform: scale(1.2);
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 900px) {
  .server-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .actions {
    flex-direction: row;
  }
}

</style>
</head>

<body>

<!-- SEARCH -->
<div class="search-row">

  <div class="search-box">
    🔎 <input value="Search servers...">
  </div>

  <!-- POSITIONS -->
  <div class="filter-box" onclick="toggle(this)">
    Positions
    <div class="popup">
      <div onclick="multi(this)">Moderator</div>
      <div onclick="multi(this)">Developer</div>
      <div onclick="multi(this)">Designer</div>
    </div>
  </div>

  <!-- QUOTA -->
  <div class="filter-box quota-box" onclick="toggleQuota(event)">
    <span id="quotaDisplay">? - ?</span>

    <div class="popup quota-popup">

      <div class="quota-inputs">
        <input id="min" readonly placeholder="?">
        <span>-</span>
        <input id="max" readonly placeholder="?">
      </div>

      <div class="numpad">
        <button onclick="pressNum(1)">1</button>
        <button onclick="pressNum(2)">2</button>
        <button onclick="pressNum(3)">3</button>
        <button onclick="pressNum(4)">4</button>
        <button onclick="pressNum(5)">5</button>
        <button onclick="pressNum(6)">6</button>
        <button onclick="pressNum(7)">7</button>
        <button onclick="pressNum(8)">8</button>
        <button onclick="pressNum(9)">9</button>
        <button onclick="clearNum()">⌫</button>
        <button onclick="pressNum(0)">0</button>
        <button onclick="applyQuota()">✓</button>
      </div>

    </div>
  </div>

  <!-- REGION -->
  <div class="filter-box" onclick="toggle(this)">
    Region
    <div class="popup">
      <div onclick="single(this)">Global</div>
      <div onclick="single(this)">Australia</div>
      <div onclick="single(this)">Europe</div>
    </div>
  </div>

</div>

<!-- SERVER -->
<div class="server-card">

  <img class="server-logo" src="https://via.placeholder.com/80">

  <div class="server-content">
    <div class="tags">
      <span>DEVELOPER</span>
      <span>OVERSIGHT</span>
    </div>

    <p>NSWRP is a friendly welcoming server based in NSW Australia.</p>
  </div>

  <div class="actions">
    <svg class="icon bookmark" onclick="bookmark(this)" viewBox="0 0 24 24" fill="white">
      <path d="M6 2h12v20l-6-4-6 4z"/>
    </svg>

    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M4 4h12l-2 4 2 4H4z"/>
    </svg>

    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M14 9l-4-4v3H4v2h6v3z"/>
    </svg>
  </div>

</div>

<script>

/* GENERIC TOGGLE */
function toggle(el){
  el.classList.toggle("active");
}

/* MULTI SELECT */
function multi(el){
  el.classList.toggle("selected");
}

/* SINGLE */
function single(el){
  let items = el.parentElement.children;
  for(let i of items) i.classList.remove("selected");
  el.classList.add("selected");
}

/* BOOKMARK */
function bookmark(el){
  el.classList.toggle("active");
}

/* ========================= */
/* QUOTA SYSTEM */
/* ========================= */

let activeField = "min";

function toggleQuota(e){
  e.stopPropagation();
  document.querySelector(".quota-box").classList.toggle("active");
}

document.getElementById("min").onclick = () => activeField = "min";
document.getElementById("max").onclick = () => activeField = "max";

function pressNum(num){
  let input = document.getElementById(activeField);
  if(input.value.length >= 2) return;
  input.value += num;
}

function clearNum(){
  let input = document.getElementById(activeField);
  input.value = input.value.slice(0, -1);
}

function applyQuota(){
  let min = document.getElementById("min").value || "?";
  let max = document.getElementById("max").value || "?";

  document.getElementById("quotaDisplay").innerText = `${min} - ${max}`;

  document.querySelector(".quota-box").classList.remove("active");
}

/* CLOSE ON OUTSIDE CLICK */
document.addEventListener("click", () => {
  document.querySelectorAll(".filter-box").forEach(el => el.classList.remove("active"));
});

</script>

</body>
</html>
