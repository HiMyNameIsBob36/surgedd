<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Roleplay Server Browser</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --border-color: #444;
            --text-main: #ffffff;
            --accent-green: #44a022;
            --tag-bg: #2d5a1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Navigation / Filters */
        .search-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            position: absolute;
            top: -8px;
            left: 12px;
            background: var(--bg-color);
            padding: 0 5px;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-green);
        }

        .search-main {
            flex: 3;
            min-width: 300px;
        }

        /* Server Card */
        .server-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            width: 100%;
            max-width: 1000px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        .logo-section img {
            width: 80px;
            height: auto;
        }

        .content-section {
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tag {
            background: var(--tag-bg);
            color: #8fce7c;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .description {
            font-size: 15px;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Action Buttons (Right Side) */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--accent-green);
            transition: transform 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--accent-green);
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            right: 30px;
            bottom: 30px;
            font-weight: bold;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .server-card {
                flex-direction: column;
                text-align: center;
            }
            .actions {
                flex-direction: row;
                width: 100%;
                justify-content: center;
                padding-top: 10px;
            }
            .tags {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="input-group search-main">
            <input type="text" placeholder="🔍 Search servers...">
        </div>

        <div class="input-group">
            <label>Positions</label>
            <input type="text" id="posInput" placeholder="Dev, Staff...">
        </div>

        <div class="input-group" style="flex: 0.5; min-width: 100px;">
            <label>Quota</label>
            <input type="text" id="quotaInput" placeholder="? - ?">
        </div>

        <div class="input-group">
            <label>Region</label>
            <input type="text" id="regionInput" placeholder="NSW, VIC...">
        </div>
    </div>

    <div class="server-card">
        <div class="logo-section">
            <svg width="80" height="60" viewBox="0 0 100 80">
                <path d="M20,50 Q50,10 80,50" fill="none" stroke="#f39c12" stroke-width="4"/>
                <circle cx="50" cy="45" r="15" fill="#f39c12" />
                <text x="10" y="75" fill="#f39c12" font-size="10" font-weight="bold">NSW ROLEPLAY</text>
            </svg>
        </div>

        <div class="content-section">
            <div class="tags">
                <span class="tag">Developer</span>
                <span class="tag">Oversight</span>
            </div>
            <div class="description">
                NSWRP is a friendly welcoming server that is based in <span id="displayRegion">New South Wales</span> Australia. 
                We are currently looking for <span id="displayPos">Staff</span>. 
                Quota: <span id="displayQuota">? - ?</span>. We would love to have YOU on the team!
            </div>
        </div>

        <div class="actions">
            <button class="icon-btn">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </button>
            <button class="icon-btn">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
            </button>
            <button class="icon-btn" onclick="copyLink()">
                <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
            </button>
        </div>
    </div>

    <div id="toast">Link copied to clipboard!</div>

    <script>
        // Live Update Logic
        const posInput = document.getElementById('posInput');
        const quotaInput = document.getElementById('quotaInput');
        const regionInput = document.getElementById('regionInput');

        const displayPos = document.getElementById('displayPos');
        const displayQuota = document.getElementById('displayQuota');
        const displayRegion = document.getElementById('displayRegion');

        posInput.addEventListener('input', (e) => {
            displayPos.innerText = e.target.value || "Staff";
        });

        quotaInput.addEventListener('input', (e) => {
            // Basic number/range filter
            displayQuota.innerText = e.target.value || "? - ?";
        });

        regionInput.addEventListener('input', (e) => {
            displayRegion.innerText = e.target.value || "New South Wales";
        });

        // Copy Link & Toast Logic
        function copyLink() {
            const dummy = document.createElement('input');
            const text = window.location.href;

            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);

            // Show Toast
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
