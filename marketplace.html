<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgedd</title>

<style>

/* ========================= */
/* ROOT */
/* ========================= */

:root {
  --primary: #3c9600;
  --primary-glow: #4bbd00;

  --bg: #000;
  --card: #02040a;

  --text: #fff;
  --muted: #8b8f98;

  --border: rgba(255,255,255,0.15);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 40px 20px;
}

/* ========================= */
/* SEARCH */
/* ========================= */

.search-wrapper {
  max-width: 1100px;
  margin: auto;
}

.search-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* SEARCH INPUT */
.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 12px 16px;
  border-radius: 30px;
  border: 2px solid var(--border);
}

.search-box span {
  opacity: 0.6;
}

.search-box input {
  background: none;
  border: none;
  outline: none;
  color: white;
  width: 100%;
}

/* FILTER BOXES */
.filter-box {
  padding: 10px 16px;
  border-radius: 30px;
  border: 2px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

/* POPUPS */
.popup {
  position: absolute;
  top: 120%;
  left: 0;
  background: #02040a;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  display: none;
  z-index: 100;
}

.filter-box.active .popup {
  display: block;
}

/* ITEMS */
.popup div {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.popup div:hover {
  background: rgba(255,255,255,0.05);
}

/* MULTI SELECT */
.popup div.selected {
  background: var(--primary);
  color: white;
}

/* ========================= */
/* QUOTA INPUT */
/* ========================= */

.quota-inputs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.quota-inputs input {
  width: 60px;
  padding: 6px;
  background: #000;
  border: 1px solid var(--border);
  color: white;
  text-align: center;
}

/* NUMBER PAD */
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.numpad button {
  padding: 10px;
  background: #000;
  border: 1px solid var(--border);
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* ========================= */
/* SERVER CARD */
/* ========================= */

.server-card {
  max-width: 900px;
  margin: 30px auto;
  padding: 16px;

  border-radius: 20px;
  border: 2px solid var(--border);
  background: var(--card);

  display: flex;
  align-items: center;
  gap: 16px;
}

/* LOGO */
.server-logo {
  width: 80px;
}

/* CONTENT */
.server-content {
  flex: 1;
}

.tags {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
}

.tags span {
  background: rgba(60,150,0,0.3);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.server-content p {
  font-weight: 600;
}

/* ACTIONS RIGHT */
.actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* SVG ICONS */
.icon {
  width: 22px;   /* smaller like you wanted */
  height: 22px;
  cursor: pointer;
  transition: 0.2s;
}

.icon:hover {
  transform: scale(1.1);
}

/* BOOKMARK ANIMATION */
.bookmark.active {
  fill: var(--primary);
  filter: drop-shadow(0 0 6px var(--primary-glow));
  transform: scale(1.2);
}

/* ========================= */
/* SHARE POPUP */
/* ========================= */

.share-popup {
  position: fixed;
  bottom: 20px;
  right: 20px;

  background: #02040a;
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 12px;

  display: none;
}

.share-popup.active {
  display: block;
}

.share-popup input {
  width: 200px;
  padding: 6px;
  background: #000;
  border: 1px solid var(--border);
  color: white;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 900px) {
  .server-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .actions {
    flex-direction: row;
  }
}

</style>
</head>

<body>

<div class="search-wrapper">

  <div class="search-row">

    <!-- SEARCH -->
    <div class="search-box">
      <span>🔎</span>
      <input value="Search servers...">
    </div>

    <!-- POSITIONS -->
    <div class="filter-box" onclick="toggle(this)">
      Positions
      <div class="popup">
        <div onclick="selectMulti(this)">Moderator</div>
        <div onclick="selectMulti(this)">Developer</div>
        <div onclick="selectMulti(this)">Designer</div>
      </div>
    </div>

    <!-- QUOTA -->
    <div class="filter-box" onclick="toggle(this)">
      Quota
      <div class="popup">
        <div class="quota-inputs">
          <input id="min" placeholder="1">
          <input id="max" placeholder="2">
        </div>

        <div class="numpad">
          <button onclick="addNum(1)">1</button>
          <button onclick="addNum(2)">2</button>
          <button onclick="addNum(3)">3</button>
          <button onclick="addNum(4)">4</button>
          <button onclick="addNum(5)">5</button>
          <button onclick="addNum(6)">6</button>
          <button onclick="addNum(7)">7</button>
          <button onclick="addNum(8)">8</button>
          <button onclick="addNum(9)">9</button>
          <button onclick="addNum(0)">0</button>
        </div>
      </div>
    </div>

    <!-- REGION -->
    <div class="filter-box" onclick="toggle(this)">
      Region
      <div class="popup">
        <div onclick="selectSingle(this)">Global</div>
        <div onclick="selectSingle(this)">Australia</div>
        <div onclick="selectSingle(this)">Europe</div>
      </div>
    </div>

  </div>

</div>

<!-- SERVER -->
<div class="server-card">

  <img class="server-logo" src="https://via.placeholder.com/80">

  <div class="server-content">
    <div class="tags">
      <span>DEVELOPER</span>
      <span>OVERSIGHT</span>
    </div>

    <p>NSWRP is a friendly welcoming server that is based in NSW Australia.</p>
  </div>

  <div class="actions">

    <!-- BOOKMARK -->
    <svg class="icon bookmark" onclick="bookmark(this)" viewBox="0 0 24 24" fill="white">
      <path d="M6 2h12v20l-6-4-6 4z"/>
    </svg>

    <!-- REPORT -->
    <svg class="icon" viewBox="0 0 24 24" fill="white">
      <path d="M4 4h12l-2 4 2 4H4z"/>
    </svg>

    <!-- SHARE -->
    <svg class="icon" onclick="share()" viewBox="0 0 24 24" fill="white">
      <path d="M14 9l-4-4v3H4v2h6v3z"/>
    </svg>

  </div>

</div>

<!-- SHARE POPUP -->
<div class="share-popup" id="shareBox">
  <input value="https://surgedd.com/server">
  <button onclick="copy()">Copy</button>
</div>

<script>

/* TOGGLE POPUPS */
function toggle(el){
  el.classList.toggle("active");
}

/* MULTI SELECT */
function selectMulti(el){
  el.classList.toggle("selected");
}

/* SINGLE SELECT */
function selectSingle(el){
  let items = el.parentElement.children;
  for(let i of items) i.classList.remove("selected");
  el.classList.add("selected");
}

/* BOOKMARK */
function bookmark(el){
  el.classList.toggle("active");
}

/* SHARE */
function share(){
  document.getElementById("shareBox").classList.toggle("active");
}

/* COPY */
function copy(){
  navigator.clipboard.writeText("https://surgedd.com/server");
}

/* NUMPAD */
let activeInput = null;

document.querySelectorAll(".quota-inputs input").forEach(i=>{
  i.onclick = ()=> activeInput = i;
});

function addNum(n){
  if(activeInput) activeInput.value += n;
}

</script>

</body>
</html>
